# AGENTS.md staleness guard — GitHub Actions workflow
#
# Place at: .github/workflows/agents-md-guard.yml
#
# What it does:
#   1. Runs `sem diff` on the PR's changed files
#   2. Counts entity-level changes (functions, classes, methods)
#   3. Comments on the PR with a staleness warning if entities changed
#
# Requires:
#   - sem installed in CI (handled by setup-sem action)
#   - AGENTS.md in repo root

name: AGENTS.md staleness guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-agents-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for sem

      - name: Install sem
        run: brew install sem-cli || (curl -sL https://github.com/Ataraxy-Labs/sem/releases/latest/download/sem-linux-x86_64.tar.gz | tar -xz -C /usr/local/bin sem && chmod +x /usr/local/bin/sem)

      - name: Check entity changes
        id: sem-check
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "status=no-agents-md" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.(go|ts|tsx|js|jsx|py|rs)$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "status=no-code-changes" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Run sem diff on the PR range
          SEM_JSON=$(sem diff --from origin/main --to HEAD --format json 2>/dev/null || echo '{"summary":{"total":0}}')
          TOTAL=$(echo "$SEM_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('summary',{}).get('total',0))" 2>/dev/null || echo "0")

          if [ "$TOTAL" -gt 0 ]; then
            echo "status=stale" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            echo "$SEM_JSON" | python3 -c "
import sys, json
d = json.load(sys.stdin)
lines = []
for c in d.get('changes', [])[:20]:
    ct = c.get('changeType', '?')
    name = c.get('entityName', '?')
    etype = c.get('entityType', '?')
    fpath = c.get('filePath', '?')
    lines.append(f'| {ct} | \`{name}\` | {etype} | \`{fpath}\` |')
print('\n'.join(lines))
" 2>/dev/null >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "status=ok" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.sem-check.outputs.status == 'stale'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.sem-check.outputs.total }}';
            const changes = `${{ steps.sem-check.outputs.changes }}`;
            const body = `## ⚠️ AGENTS.md staleness warning

            **${total} code entities changed** in this PR (functions, classes, methods, etc.).
            Please review \`AGENTS.md\` to ensure documentation is still accurate.

            ### Changed entities

            | Change | Entity | Type | File |
            |--------|--------|------|------|
            ${changes}

            <details>
            <summary>How to update</summary>

            1. Review the changed entities above
            2. Check if \`AGENTS.md\` sections (Architecture, Commands, Conventions) are affected
            3. Update in-place if needed — keep it under 20-30 lines
            </details>

            ---
            _Generated by \`cali-agents-md\` staleness guard_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Pass if no issues
        if: steps.sem-check.outputs.status != 'stale'
        run: echo "✅ No AGENTS.md staleness issues detected."
